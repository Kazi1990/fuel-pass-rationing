<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fuel Pass Pro | Ultra Premium</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
    <style>
        /* ব্লগের উপরের গ্যাপ দূর করার জন্য */
        html, body { margin: 0 !important; padding: 0 !important; top: 0 !important; }
        
        :root {
            --neon-cyan: #00f2fe;
            --neon-pink: #ff007f;
            --neon-purple: #7000ff;
        }

        body { 
            background: #020205;
            background-image: 
                radial-gradient(circle at 10% 20%, rgba(0, 242, 254, 0.1) 0%, transparent 30%),
                radial-gradient(circle at 90% 80%, rgba(112, 0, 255, 0.12) 0%, transparent 30%);
            color: #fff; 
            font-family: 'Rajdhani', sans-serif;
            min-height: 100vh;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.07);
            backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.6);
        }

        /* পাম্প টার্মিনাল কালার */
        .pump-card { border-color: var(--neon-pink) !important; box-shadow: 0 0 25px rgba(255, 0, 127, 0.3); }
        .btn-pink { background: var(--neon-pink); color: white; box-shadow: 0 0 15px var(--neon-pink); }

        /* অ্যাডমিন সেন্টার কালার */
        .admin-card { border-color: var(--neon-purple) !important; box-shadow: 0 0 25px rgba(112, 0, 255, 0.3); }
        .btn-purple { background: var(--neon-purple); color: white; box-shadow: 0 0 15px var(--neon-purple); }

        .tab-btn {
            background: rgba(255,255,255,0.05);
            padding: 12px 24px;
            border-radius: 50px;
            font-weight: 700;
            transition: 0.4s;
        }
        .tab-btn.active {
            background: var(--neon-cyan);
            color: #000;
            box-shadow: 0 0 20px var(--neon-cyan);
        }
        
        input {
            background: rgba(0, 0, 0, 0.7) !important;
            border: 2px solid rgba(255, 255, 255, 0.2) !important;
            color: #fff !important;
            padding: 1rem !important;
            border-radius: 12px;
            width: 100%;
        }
    </style>
</head>
<body class="p-4 md:p-10">

    <div class="max-w-5xl mx-auto" style="margin-top: -25px !important;">
        <header class="glass-card p-8 mb-8 text-center" style="border-top: 3px solid var(--neon-cyan);">
            <h1 class="text-5xl font-black italic tracking-tighter uppercase" style="color: var(--neon-cyan); font-family: 'Orbitron', sans-serif;">Fuel Pass Pro</h1>
            <p class="text-gray-400 font-bold tracking-[0.3em] text-[10px] uppercase">SBAC Hasnabad Hub | Powered by ICT Eng.</p>
        </header>

        <nav class="flex flex-wrap justify-center gap-4 mb-10">
            <button onclick="nav('user')" id="btn-user" class="tab-btn active">User Portal</button>
            <button onclick="nav('pump')" id="btn-pump" class="tab-btn">Pump Terminal</button>
            <button onclick="nav('admin')" id="btn-admin" class="tab-btn">Admin Center</button>
        </nav>

        <section id="userSec" class="grid grid-cols-1 md:grid-cols-2 gap-8">
            <div class="glass-card p-8 border-l-8 border-cyan-500">
                <h2 class="text-xl font-black mb-6 uppercase text-cyan-400">Account Activation</h2>
                <div class="space-y-4">
                    <input type="text" id="regName" placeholder="Full Name">
                    <input type="text" id="regVehicle" placeholder="Vehicle ID (e.g. Dhaka-Ka 123)" class="uppercase">
                    <button onclick="register()" class="w-full p-4 rounded-xl font-black" style="background: var(--neon-cyan); color: #000;">ACTIVATE PASS</button>
                </div>
            </div>
            <div class="glass-card p-8 text-center flex flex-col items-center justify-center">
                <input type="text" id="loginId" placeholder="Enter Vehicle ID" class="max-w-xs mb-4 text-center uppercase">
                <button onclick="login()" class="w-full max-w-xs p-4 glass-card font-bold hover:bg-white/10">VIEW STATUS</button>
                <div id="qrBox" class="hidden mt-6">
                    <div id="qrcode" class="p-3 bg-white rounded-2xl inline-block shadow-2xl"></div>
                    <div class="mt-4">
                        <span id="dispQuota" class="text-7xl font-black" style="color: var(--neon-cyan); font-family: 'Orbitron', sans-serif;">60</span>
                        <span class="text-xl font-bold">L</span>
                    </div>
                </div>
            </div>
        </section>

        <section id="pumpSec" class="hidden">
            <div class="glass-card p-10 max-w-2xl mx-auto pump-card">
                <h2 class="text-3xl font-black text-center mb-8 italic" style="color: var(--neon-pink); font-family: 'Orbitron', sans-serif;">DISPENSER INTERFACE</h2>
                <input type="text" id="scanIn" onchange="checkUser(this.value)" placeholder="SCAN QR CODE HERE" class="text-center p-6 text-2xl border-pink-500/30 mb-6" style="color: var(--neon-pink) !important;">
                <div id="pData" class="hidden space-y-6">
                    <div class="p-6 bg-pink-500/10 rounded-2xl border border-pink-500/20 text-center">
                        <h3 id="pName" class="text-xl font-bold text-white uppercase"></h3>
                    </div>
                    <div class="flex gap-4">
                        <input type="number" id="fQty" placeholder="Liters" class="text-center text-3xl font-black">
                        <button onclick="fill()" class="px-10 rounded-xl font-black btn-pink">DISPENSE</button>
                    </div>
                </div>
            </div>
        </section>

        <section id="adminSec" class="hidden">
            <div id="admAuth" class="glass-card p-10 max-w-md mx-auto admin-card text-center">
                <h2 class="text-2xl font-black mb-6" style="color: var(--neon-purple);">CORE COMMAND</h2>
                <input type="password" id="admPass" placeholder="ENTER ACCESS KEY" class="mb-6 text-center">
                <button onclick="auth()" class="w-full p-4 rounded-xl font-black btn-purple">INITIALIZE DASHBOARD</button>
            </div>
            <div id="admDash" class="hidden space-y-6">
                <div class="glass-card p-6 flex justify-between items-center border-l-8 border-purple-600">
                    <h2 class="font-bold text-purple-400 uppercase italic text-xl">Core Data Feed</h2>
                    <button onclick="reset()" class="px-6 py-2 bg-red-600 rounded-lg font-black text-xs">WEEKLY RESET</button>
                </div>
                <div id="admList" class="grid grid-cols-1 md:grid-cols-3 gap-4"></div>
            </div>
        </section>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, doc, getDoc, setDoc, updateDoc, collection, getDocs, writeBatch } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBJsyYpakn99GGYpwjHIHVaMpBEa4SBntI",
            authDomain: "booming-premise-253521.firebaseapp.com",
            projectId: "booming-premise-253521",
            storageBucket: "booming-premise-253521.firebasestorage.app",
            messagingSenderId: "916001736696",
            appId: "1:916001736696:web:22df61da1134da9514b80d"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        window.nav = (s) => {
            ['userSec', 'pumpSec', 'adminSec'].forEach(id => document.getElementById(id).classList.add('hidden'));
            ['btn-user', 'btn-pump', 'btn-admin'].forEach(id => document.getElementById(id).classList.remove('active'));
            document.getElementById(s + 'Sec').classList.remove('hidden');
            document.getElementById('btn-' + s).classList.add('active');
        };

        window.register = async () => {
            const v = document.getElementById('regVehicle').value.trim().toUpperCase();
            const n = document.getElementById('regName').value.trim();
            if(!v || !n) return alert("Fill all fields");
            await setDoc(doc(db, "vehicles", v), { owner_name: n, remaining_quota: 60, last_active: "New" });
            alert("Pass Activated!"); location.reload();
        };

        window.login = async () => {
            const v = document.getElementById('loginId').value.trim().toUpperCase();
            const snap = await getDoc(doc(db, "vehicles", v));
            if(snap.exists()){
                document.getElementById('dispQuota').innerText = snap.data().remaining_quota;
                document.getElementById('qrBox').classList.remove('hidden');
                document.getElementById('qrcode').innerHTML = "";
                new QRCode(document.getElementById('qrcode'), { text: v, width: 140, height: 140 });
            } else { alert("ID Not Found"); }
        };

        let activeV = "";
        window.checkUser = async (v) => {
            activeV = v.toUpperCase();
            const snap = await getDoc(doc(db, "vehicles", activeV));
            if(snap.exists()){
                document.getElementById('pName').innerText = snap.data().owner_name + " | " + activeV;
                document.getElementById('pData').classList.remove('hidden');
            }
        };

        window.fill = async () => {
            const qty = parseFloat(document.getElementById('fQty').value);
            const ref = doc(db, "vehicles", activeV);
            const snap = await getDoc(ref);
            const bal = snap.data().remaining_quota;
            if(qty > 0 && qty <= bal){
                await updateDoc(ref, { remaining_quota: bal - qty, last_active: new Date().toLocaleTimeString() });
                alert("Success!"); location.reload();
            } else { alert("Insufficient Balance"); }
        };

        window.auth = () => {
            if(document.getElementById('admPass').value === "1234"){
                document.getElementById('admAuth').classList.add('hidden');
                document.getElementById('admDash').classList.remove('hidden');
                fetchList();
            }
        };

        async function fetchList(){
            const snap = await getDocs(collection(db, "vehicles"));
            const list = document.getElementById('admList');
            list.innerHTML = "";
            snap.forEach(d => {
                const data = d.data();
                // এখানে 'owner_name' এবং 'remaining_quota' নিশ্চিত করা হয়েছে যাতে undefined না আসে
                list.innerHTML += `
                <div class="glass-card p-5 border-b-4 border-purple-500">
                    <p class="text-[10px] text-purple-400 font-bold uppercase">${d.id}</p>
                    <h3 class="text-lg font-bold text-white mt-1">${data.owner_name || 'No Name'}</h3>
                    <div class="text-3xl font-black text-purple-400 mt-2">${data.remaining_quota ?? 0}L</div>
                </div>`;
            });
        }

        window.reset = async () => {
            if(!confirm("Reset all quotas to 60L?")) return;
            const batch = writeBatch(db);
            const snap = await getDocs(collection(db, "vehicles"));
            snap.forEach(d => batch.update(d.ref, { remaining_quota: 60 }));
            await batch.commit(); fetchList();
        };
    </script>
</body>
</html>
